name: Build & Test (service)

on:
  push:
    branches: [main]
    paths:
      - 'service/**'
      - '.github/workflows/service.yml'
  pull_request:
    branches: [main]
    paths:
      - 'service/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

defaults:
  run:
    working-directory: service

env:
  # The go.mod replace-directive targets; keep in lockstep with the
  # ARGs in service/Dockerfile.
  RA_TLS_CLIENTS_REF: 67a20d31197cebe8fa621925f4f2affa3e3822f4
  ENCLAVE_VAULTS_CLIENT_REF: 7cfea6e33ff809d0a13d0303726b79329ea1ae60

jobs:
  test:
    name: Test
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_DB: drive_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Clone replace-directive siblings
        run: |
          git clone https://github.com/Privasys/ra-tls-clients ../../platform/ra-tls-clients
          git -C ../../platform/ra-tls-clients checkout "$RA_TLS_CLIENTS_REF"
          git clone https://github.com/Privasys/enclave-vaults-client ../../platform/enclave-vaults-client
          git -C ../../platform/enclave-vaults-client checkout "$ENCLAVE_VAULTS_CLIENT_REF"
      - run: go mod download
      # Stock Go: the ratls-tagged code is stubbed; the production image
      # builds with the forked toolchain in Docker. The store tests run
      # against SQLite and the postgres service.
      - run: go test ./... -count=1 -race
        env:
          DRIVE_TEST_PG_DSN: postgres://postgres@127.0.0.1:5432/drive_test?sslmode=disable

  build:
    name: Build binary
    runs-on: ubuntu-24.04
    needs: test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Clone replace-directive siblings
        run: |
          git clone https://github.com/Privasys/ra-tls-clients ../../platform/ra-tls-clients
          git -C ../../platform/ra-tls-clients checkout "$RA_TLS_CLIENTS_REF"
          git clone https://github.com/Privasys/enclave-vaults-client ../../platform/enclave-vaults-client
          git -C ../../platform/enclave-vaults-client checkout "$ENCLAVE_VAULTS_CLIENT_REF"
      - run: CGO_ENABLED=0 go build -trimpath -ldflags='-s -w' -o drive ./cmd/drive
      - uses: actions/upload-artifact@v7
        with:
          name: drive
          path: service/drive

  docker:
    name: Build & push Docker image
    runs-on: ubuntu-24.04
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: repo
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - id: version
        run: echo "value=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
      # The platform reads the app's typed capabilities from the
      # org.privasys.manifest OCI label. Base64-encode the minified
      # privasys.json: the action's labels input is CSV-parsed, which
      # strips interior quotes from raw JSON (any `,"x",` sequence);
      # the platform accepts base64-encoded JSON labels for this reason.
      - id: manifest
        run: |
          echo "json=$(jq -c . privasys.json | base64 -w0)" >> "$GITHUB_OUTPUT"
      # provenance:false keeps the pushed manifest a plain single image so
      # the registry digest is stable — deployments pin that digest.
      - id: push
        uses: docker/build-push-action@v7
        with:
          context: service
          file: service/Dockerfile
          push: true
          provenance: false
          build-args: |
            VERSION=${{ steps.version.outputs.value }}
          labels: |
            org.privasys.manifest=${{ steps.manifest.outputs.json }}
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}:latest
            ghcr.io/${{ steps.repo.outputs.name }}:${{ steps.version.outputs.value }}
      - name: Print pinnable digest
        run: |
          echo "Deploy by digest, never by tag:" >> "$GITHUB_STEP_SUMMARY"
          echo '`ghcr.io/${{ steps.repo.outputs.name }}@${{ steps.push.outputs.digest }}`' >> "$GITHUB_STEP_SUMMARY"
