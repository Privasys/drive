name: Build & Test (service)

on:
  push:
    branches: [main]
    paths:
      - 'service/**'
      - '.github/workflows/service.yml'
  pull_request:
    branches: [main]
    paths:
      - 'service/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

defaults:
  run:
    working-directory: service

jobs:
  test:
    name: Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - run: go mod download
      - run: go test ./... -count=1 -race

  build:
    name: Build binary
    runs-on: ubuntu-24.04
    needs: test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - run: CGO_ENABLED=0 go build -trimpath -ldflags='-s -w' -o drive ./cmd/drive
      - uses: actions/upload-artifact@v7
        with:
          name: drive
          path: service/drive

  docker:
    name: Build & push Docker image
    runs-on: ubuntu-24.04
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: repo
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - id: version
        run: echo "value=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
      # The platform reads the app's typed capabilities from the
      # org.privasys.manifest OCI label — bake the minified privasys.json in.
      - id: manifest
        run: |
          {
            echo "json<<PRIVASYS_MANIFEST_EOF"
            jq -c . privasys.json
            echo "PRIVASYS_MANIFEST_EOF"
          } >> "$GITHUB_OUTPUT"
      # provenance:false keeps the pushed manifest a plain single image so
      # the registry digest is stable — deployments pin that digest.
      - id: push
        uses: docker/build-push-action@v7
        with:
          context: service
          file: service/Dockerfile
          push: true
          provenance: false
          build-args: |
            VERSION=${{ steps.version.outputs.value }}
          labels: |
            org.privasys.manifest=${{ steps.manifest.outputs.json }}
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}:latest
            ghcr.io/${{ steps.repo.outputs.name }}:${{ steps.version.outputs.value }}
      - name: Print pinnable digest
        run: |
          echo "Deploy by digest, never by tag:" >> "$GITHUB_STEP_SUMMARY"
          echo '`ghcr.io/${{ steps.repo.outputs.name }}@${{ steps.push.outputs.digest }}`' >> "$GITHUB_STEP_SUMMARY"
